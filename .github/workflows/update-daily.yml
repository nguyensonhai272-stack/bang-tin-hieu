name: Cập nhật dữ liệu HOSE hằng ngày

on:
  push:
    branches: [main]
    paths-ignore:
      - "data.js"
      - "data.json"
  schedule:
    - cron: "30 9 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cài thư viện
        run: pip install -U vnstock pandas

      - name: Tải dữ liệu mới (sinh data.js)
        run: python fetch_data.py

      - name: Lưu dữ liệu mới vào kho
        run: |
          git config user.name "hose-bot"
          git config user.email "hose-bot@users.noreply.github.com"
          git add data.js data.json
          if git diff --staged --quiet; then
            echo "Không có thay đổi."
          else
            git commit -m "Cập nhật dữ liệu HOSE: $(date -u +%Y-%m-%d)"
            git push
          fi
