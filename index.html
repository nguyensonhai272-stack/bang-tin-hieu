<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HOSE Signal — VN100</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0E1116;--panel:#161B22;--panel2:#1C232C;--border:#2A323D;--text:#E8EAED;--muted:#8B94A3;--accent:#4FD1C5;--line:#6AB7FF;--amber:#E0A23C;--buy:#2DBE8B;--sell:#E5484D;--hold:#E0A23C;--r:10px;--disp:'Space Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;--body:system-ui,-apple-system,sans-serif;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:var(--body);font-size:14px;line-height:1.55}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}h2{font-family:var(--disp);font-weight:600;margin:0;font-size:18px}.muted{color:var(--muted);font-size:12.5px}.small{font-size:11.5px}
.app{display:grid;grid-template-columns:200px 1fr;min-height:100vh}
.side{background:var(--panel);border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px}
.brand{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:-.3px;margin-bottom:1px}.brand .dot{color:var(--accent)}.brand-sub{font-size:10.5px;color:var(--muted);margin-bottom:16px;line-height:1.4}
.nav{display:flex;flex-direction:column;gap:2px}
.nav button{display:flex;align-items:center;gap:10px;background:none;border:none;color:var(--muted);font-family:var(--body);font-size:13px;text-align:left;padding:9px 11px;border-radius:7px;cursor:pointer;transition:.12s}
.nav button:hover{background:var(--panel2);color:var(--text)}.nav button.on{background:var(--panel2);color:var(--text);box-shadow:inset 2px 0 0 var(--accent)}.nav .ic{width:7px;height:7px;border-radius:2px;background:currentColor;opacity:.6}
.side-foot{margin-top:auto;font-size:10px;color:var(--muted);line-height:1.5;border-top:1px solid var(--border);padding-top:10px}
.demo-badge{display:inline-block;background:rgba(224,162,60,.13);color:var(--amber);border:1px solid rgba(224,162,60,.3);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:500;margin-bottom:6px}
.demo-badge.real{background:rgba(45,190,139,.13);color:var(--buy);border-color:rgba(45,190,139,.3)}
.main{padding:20px 22px 60px;max-width:1280px}
.view{display:none}.view.show{display:block}
.row-between{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
/* table */
table.grid{width:100%;border-collapse:collapse;font-size:12.5px}
table.grid th{text-align:left;color:var(--muted);font-weight:500;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;padding:0 10px 9px;border-bottom:1px solid var(--border)}
table.grid td{padding:9px 10px;border-bottom:1px solid var(--border)}
table.grid tbody tr{cursor:pointer;transition:.1s}table.grid tbody tr:hover{background:var(--panel2)}
.t-sym{font-family:var(--disp);font-weight:600;font-size:13.5px}.t-name{font-size:10.5px;color:var(--muted)}.t-reason{color:var(--muted);font-size:11.5px}.liq{color:var(--muted) !important}
.sector-tag{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:10px;color:var(--muted)}
.sector-header-row td{cursor:default!important}
.sector-header-row:hover td{background:var(--panel2)!important}
.badge{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:600;font-family:var(--disp)}
.badge.buy{background:rgba(45,190,139,.15);color:var(--buy)}.badge.sell{background:rgba(229,72,77,.15);color:var(--sell)}.badge.hold{background:rgba(224,162,60,.12);color:var(--hold)}.badge.warn{background:rgba(224,162,60,.20);color:var(--hold);border:1px solid rgba(224,162,60,.45)}
.fund-grade-sm{display:inline-block;padding:1px 7px;border-radius:5px;font-size:11px;font-weight:700}
.conf-badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10.5px;font-weight:600;cursor:default;white-space:nowrap}
/* controls */
.seg{display:inline-flex;background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:2px}.seg.sm button{font-size:11px;padding:3px 8px}
.seg button{background:none;border:none;color:var(--muted);padding:5px 11px;border-radius:5px;cursor:pointer;font-size:12px;font-family:var(--body)}.seg button.on{background:var(--accent);color:#06231f;font-weight:600}
.sel{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-family:var(--body);font-size:12.5px;min-width:180px}
.sel.sm{min-width:140px;padding:6px 10px;font-size:12px}
.search-box{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-family:var(--body);font-size:12.5px;width:120px;outline:none}
.search-box:focus{border-color:var(--accent)}
/* detail */
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:0}
.verdict{border-top:3px solid var(--border)}.verdict.buy{border-top-color:var(--buy)}.verdict.sell{border-top-color:var(--sell)}.verdict.hold{border-top-color:var(--hold)}
.verdict-big{display:flex;align-items:center;gap:10px;margin:6px 0 12px}.vscore{font-size:20px;font-weight:500}
.fund-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}.fund-desc{font-size:12.5px;color:var(--muted)}
.fund-kpis{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-radius:7px;overflow:hidden}
/* meter */
.meter{margin:4px 0}.meter-track{position:relative;height:9px;border-radius:5px;overflow:hidden;display:flex}
.meter-zone{height:100%}.z-sell{width:37.5%;background:rgba(229,72,77,.4)}.z-hold{width:25%;background:rgba(224,162,60,.35)}.z-buy{width:37.5%;background:rgba(45,190,139,.4)}
.meter-mark{position:absolute;top:-3px;width:3px;height:15px;background:var(--text);border-radius:2px;transform:translateX(-50%);box-shadow:0 0 0 2px var(--panel)}
.meter-labels{display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted);margin-top:5px}
.gbars{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.gbar{display:grid;grid-template-columns:100px 1fr 38px;align-items:center;gap:7px}
.gbar-name{font-size:10.5px}.gbar-w{color:var(--muted);font-size:9.5px}
.gbar-track{position:relative;height:6px;background:var(--panel2);border-radius:4px}.gbar-mid{position:absolute;left:50%;top:-2px;width:1px;height:10px;background:var(--border)}.gbar-fill{position:absolute;top:0;height:6px;border-radius:4px}.gbar-val{font-family:var(--mono);font-size:10px;text-align:right}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-radius:7px;overflow:hidden}
.kpi{background:var(--panel);padding:10px 12px}.kpi-l{font-size:10.5px;color:var(--muted)}.kpi-v{font-size:16px;margin:2px 0}.kpi-c{font-size:10px;color:var(--accent)}
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.metric{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}.metric.buy{border-left:3px solid var(--buy)}.metric.sell{border-left:3px solid var(--sell)}
.m-l{font-size:10.5px;color:var(--muted)}.m-v{font-size:18px;margin-top:3px}
canvas{width:100%;display:block;margin:6px 0 4px;cursor:crosshair}
.readout{font-family:var(--mono);font-size:11px;color:var(--muted);min-height:16px;padding:2px 0}
.legend2{display:flex;gap:14px;font-size:10.5px;color:var(--muted);margin-top:5px;flex-wrap:wrap}.legend2 i{display:inline-block;width:11px;height:3px;border-radius:2px;margin-right:4px;vertical-align:middle}
.sev.extreme{color:var(--sell)}.sev.high{color:var(--amber)}.sev.medium{color:var(--text)}
@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center}.nav{flex-direction:row;flex-wrap:wrap}.side-foot,.brand-sub{display:none}.grid3{grid-template-columns:1fr}.mgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div><div class="brand">HOSE Signal<span class="dot">.</span></div>
    <div class="brand-sub">VN100 · Kỹ thuật + Cơ bản</div></div>
    <nav class="nav">
      <button data-tab="table"    class="on"><span class="ic"></span>Bảng tín hiệu</button>
      <button data-tab="detail"          ><span class="ic"></span>Phân tích mã</button>
      <button data-tab="backtest"        ><span class="ic"></span>Kiểm định</button>
      <button data-tab="events"          ><span class="ic"></span>Sự kiện</button>
    </nav>
    <div class="side-foot" id="data-foot">
      <span class="demo-badge" id="data-badge">● Dữ liệu minh hoạ</span>
      <span id="data-foot-text">Mô phỏng để thử. Không phải KNĐT.</span>
    </div>
  </aside>
  <main class="main">
    <section id="view-table"    class="view show"></section>
    <section id="view-detail"   class="view"></section>
    <section id="view-backtest" class="view"></section>
    <section id="view-events"   class="view"></section>
  </main>
</div>
<script src="signals.js"></script>
<script src="data.js"></script>
<script>
/* engine.js v3 — đọc signals.js (tính sẵn server-side) + data.js (OHLCV chi tiết) */
(function(root){
"use strict";

/* ── Dữ liệu thật (ưu tiên) vs minh hoạ ─────────────────────────────── */
const _SIG  = (typeof window!=="undefined" && window.HOSE_SIGNALS) ? window.HOSE_SIGNALS : null;
const _DATA = (typeof window!=="undefined" && window.HOSE_DATA)    ? window.HOSE_DATA    : null;
const IS_REAL = !!(_SIG && Object.keys(_SIG.signals||{}).length);

/* ── PRNG + minh hoạ (fallback offline) ─────────────────────────────── */
function mulberry32(seed){
  let a=seed>>>0;
  return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};
}
function gauss(r){let u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function bdays(a,b){const out=[];let d=new Date(a+"T00:00:00Z"),e=new Date(b+"T00:00:00Z");while(d<=e){const w=d.getUTCDay();if(w&&w<6)out.push(d.toISOString().slice(0,10));d=new Date(d.getTime()+86400000);}return out;}

const SYN_UNI={
  VCB:{name:"Vietcombank",sector:"Ngân hàng",beta:0.95,alpha:0.00018,sig:0.013,p0:18000},
  VIC:{name:"Vingroup",sector:"Bất động sản",beta:1.15,alpha:0.00010,sig:0.020,p0:42000},
  HPG:{name:"Hòa Phát",sector:"Thép",beta:1.25,alpha:0.00015,sig:0.021,p0:9000},
  FPT:{name:"FPT",sector:"Công nghệ",beta:0.90,alpha:0.00035,sig:0.016,p0:7000},
  VNM:{name:"Vinamilk",sector:"Tiêu dùng",beta:0.70,alpha:0.00004,sig:0.013,p0:90000},
  MBB:{name:"MB Bank",sector:"Ngân hàng",beta:1.10,alpha:0.00020,sig:0.018,p0:15000},
  SSI:{name:"SSI",sector:"Chứng khoán",beta:1.30,alpha:0.00012,sig:0.022,p0:12000},
  GAS:{name:"PV Gas",sector:"Dầu khí",beta:0.85,alpha:0.00005,sig:0.017,p0:65000},
  STB:{name:"Sacombank",sector:"Ngân hàng",beta:1.10,alpha:0.00014,sig:0.018,p0:17000},
  MWG:{name:"Thế Giới Di Động",sector:"Bán lẻ",beta:1.05,alpha:0.00020,sig:0.019,p0:15000},
};
const ANCHORS=[["2018-01-02",970],["2018-04-09",1150],["2018-12-28",892],
  ["2020-03-24",660],["2020-12-31",1105],["2021-11-25",1500],
  ["2022-01-06",1528],["2022-11-16",874],["2022-12-30",1007],
  ["2023-12-29",1130],["2024-12-31",1267],["2025-04-09",1073],
  ["2025-12-25",1806],["2026-06-19",1760]];
const SHOCKS={"2020-03-09":-0.06,"2020-03-23":-0.062,"2022-03-29":-0.040,
  "2022-10-10":-0.050,"2025-04-03":-0.067,"2025-08-07":0.042,"2025-10-08":0.030};

function buildSynIndex(){
  const dates=bdays("2018-01-02","2026-06-19");
  const dmap={}; dates.forEach((d,i)=>dmap[d]=i);
  const n=dates.length, level=new Array(n).fill(0);
  for(let k=0;k<ANCHORS.length-1;k++){
    const[d0,v0]=ANCHORS[k],[d1,v1]=ANCHORS[k+1];
    const p0=dmap[d0]??0, p1=dmap[d1]??p0+1;
    const lv0=Math.log(v0),lv1=Math.log(v1);
    for(let i=p0;i<=p1;i++){const f=p1>p0?(i-p0)/(p1-p0):0;level[i]=Math.exp(lv0+f*(lv1-lv0));}
  }
  const rng=mulberry32(20180102); const close=new Array(n); let eps=0;
  for(let i=0;i<n;i++){eps=0.92*eps+0.006*gauss(rng);if(SHOCKS[dates[i]])eps+=SHOCKS[dates[i]];close[i]=level[i]*Math.exp(eps);}
  return{dates,close};
}
const _IDX=buildSynIndex();

function buildSynStock(sym){
  const cfg=SYN_UNI[sym]; if(!cfg) return null;
  const{dates,close:idx}=_IDX; const n=dates.length;
  const rng=mulberry32(hashStr(sym)^0x9e3779b9), vrng=mulberry32(hashStr(sym+"v"));
  const close=new Array(n),open=new Array(n),high=new Array(n),low=new Array(n),vol=new Array(n);
  let aC=0,id=0;
  for(let i=0;i<n;i++){
    if(i>0)aC+=cfg.alpha; id=0.95*id+cfg.sig*gauss(rng);
    close[i]=Math.max(500,cfg.p0*Math.pow(idx[i]/idx[0],cfg.beta)*Math.exp(aC+id));
  }
  for(let i=0;i<n;i++){
    open[i]=i===0?close[i]:close[i-1];
    const r=i===0?0:Math.abs(Math.log(close[i]/close[i-1]));
    const d=(0.004+r)*close[i];
    high[i]=Math.max(open[i],close[i])+Math.abs(gauss(vrng))*d*0.5;
    low[i]=Math.min(open[i],close[i])-Math.abs(gauss(vrng))*d*0.5;
    vol[i]=Math.round((800000+Math.abs(gauss(vrng))*2500000)*(r>0.03?2.5:1));
  }
  return{dates,open,high,low,close,volume:vol};
}

/* ── Chỉ báo (dùng khi cần phân tích chi tiết offline) ─────────────── */
const I={};
I.sma=(s,p)=>s.map((_,i)=>i<p-1?null:s.slice(i-p+1,i+1).reduce((a,b)=>a+b,0)/p);
I.ema=(s,p)=>{const k=2/(p+1);const o=[];let pr=s[0];for(let i=0;i<s.length;i++){pr=i===0?s[0]:s[i]*k+pr*(1-k);o.push(pr);}return o;};
function wilder(s,p){const o=new Array(s.length).fill(null);let pr=null,buf=[],cnt=0;for(let i=0;i<s.length;i++){if(s[i]==null)continue;if(pr==null){buf.push(s[i]);if(buf.length===p){pr=buf.reduce((a,b)=>a+b,0)/p;o[i]=pr;}}else{pr=(pr*(p-1)+s[i])/p;o[i]=pr;}}return o;}
I.rsi=function(c,p=14){const g=[null],l=[null];for(let i=1;i<c.length;i++){const d=c[i]-c[i-1];g.push(Math.max(d,0));l.push(Math.max(-d,0));}const ag=wilder(g.slice(1),p),al=wilder(l.slice(1),p);const out=[null];for(let i=0;i<ag.length;i++){if(ag[i]==null||al[i]==null){out.push(null);continue;}const rs=al[i]===0?100:ag[i]/al[i];out.push(100-100/(1+rs));}return out;};
I.macd=function(c,f=12,s=26,sg=9){const ef=I.ema(c,f),es=I.ema(c,s),m=ef.map((v,i)=>v-es[i]),si=I.ema(m,sg);return{macd:m,signal:si,hist:m.map((v,i)=>v-si[i])};};
I.bollinger=function(c,p=20,k=2){const mid=I.sma(c,p);const up=[],lo=[],pb=[];for(let i=0;i<c.length;i++){if(i<p-1){up.push(null);lo.push(null);pb.push(null);continue;}let sum2=0,cnt=0;for(let j=i-p+1;j<=i;j++)if(c[j]!=null){sum2+=(c[j]-mid[i])**2;cnt++;}const sd=Math.sqrt(sum2/cnt);up.push(mid[i]+k*sd);lo.push(mid[i]-k*sd);pb.push((up[i]-lo[i])>0?(c[i]-lo[i])/(up[i]-lo[i]):null);}return{mid,up,lo,pctb:pb};};
I.adx=function(h,l,c,p=14){const pdm=[null],mdm=[null],tr=[null];for(let i=1;i<c.length;i++){const u=h[i]-h[i-1],d=l[i-1]-l[i];pdm.push(u>d&&u>0?u:0);mdm.push(d>u&&d>0?d:0);tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));}const at=wilder(tr.slice(1),p),sp=wilder(pdm.slice(1),p),sm=wilder(mdm.slice(1),p);const dxA=[],pdiA=[],mdiA=[];for(let i=0;i<at.length;i++){if(at[i]==null||at[i]===0){pdiA.push(null);mdiA.push(null);dxA.push(null);continue;}const pi=100*sp[i]/at[i],mi=100*sm[i]/at[i];pdiA.push(pi);mdiA.push(mi);dxA.push((pi+mi)>0?100*Math.abs(pi-mi)/(pi+mi):null);}return{adx:[null,...wilder(dxA,p)],pdi:[null,...pdiA],mdi:[null,...mdiA]};};
I.obv=function(c,v){const o=[0];for(let i=1;i<c.length;i++)o.push(o[i-1]+Math.sign(c[i]-c[i-1])*v[i]);return o;};

function enrich(d){
  const{open,high,low,close,volume}=d;
  const mc=I.macd(close),bb=I.bollinger(close),adx=I.adx(high,low,close);
  return{...d,sma20:I.sma(close,20),sma50:I.sma(close,50),
    rsi:I.rsi(close,14),macd:mc.macd,macdSignal:mc.signal,macdHist:mc.hist,
    bbUp:bb.up,bbMid:bb.mid,bbLo:bb.lo,bbPctb:bb.pctb,
    adx:adx.adx,plusDI:adx.pdi,minusDI:adx.mdi,
    atr:I.sma(close.map((_,i)=>i===0?0:Math.max(high[i]-low[i],Math.abs(high[i]-close[i-1]),Math.abs(low[i]-close[i-1]))),14),
    obv:I.obv(close,volume),volMA20:I.sma(volume,20),
    stochK:close.map((_,i)=>{if(i<13)return null;const hh=Math.max(...high.slice(i-13,i+1)),ll=Math.min(...low.slice(i-13,i+1));return(hh-ll)>0?100*(close[i]-ll)/(hh-ll):null;}),
  };
}

/* ── Điểm cơ bản ────────────────────────────────────────────────────── */
function scoreFundamental(fund){
  if(!fund||!Object.keys(fund).length)return null;
  let s=0;
  if(fund.pe&&fund.pe>0){const v=fund.pe<10?1:fund.pe<15?0.5:fund.pe<25?0:fund.pe<35?-0.5:-1;s+=v*0.25;}
  if(fund.pb&&fund.pb>0){const v=fund.pb<1?1:fund.pb<2?0.5:fund.pb<3.5?0:-0.5;s+=v*0.15;}
  if(fund.roe!=null){const r=fund.roe>1?fund.roe/100:fund.roe;s+=(r>0.20?1:r>0.15?0.7:r>0.10?0.3:r>0.05?0:-0.5)*0.30;}
  if(fund.roa!=null){const r=fund.roa>1?fund.roa/100:fund.roa;s+=(r>0.10?1:r>0.06?0.5:r>0.03?0:-0.5)*0.15;}
  if(fund.eps_growth!=null){const g=fund.eps_growth>1?fund.eps_growth/100:fund.eps_growth;s+=(g>0.20?1:g>0.10?0.5:g>0?0.1:g>-0.10?-0.3:-1)*0.15;}
  return Math.max(-1,Math.min(1,s));
}
function fundGrade(score){
  if(score==null)return{grade:"N/A",color:"#8B94A3",desc:"Chưa có dữ liệu"};
  if(score>=0.6)return{grade:"A",color:"#2DBE8B",desc:"Tài chính rất tốt"};
  if(score>=0.3)return{grade:"B",color:"#4FD1C5",desc:"Tài chính ổn định"};

<script>
/* charts.js — biểu đồ canvas nhẹ, tự chứa (không cần thư viện ngoài) */
(function (root) {
"use strict";
const C = {
  axis: "#3A4452", grid: "#222A34", text: "#8B94A3", textHi: "#E8EAED",
  cross: "#4FD1C5",
};
function css(canvas, w, h) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr);
  canvas.style.width = w + "px"; canvas.style.height = h + "px";
  const ctx = canvas.getContext("2d"); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return ctx;
}
function niceFmt(v) {
  if (v == null || isNaN(v)) return "–";
  if (Math.abs(v) >= 1e9) return (v / 1e9).toFixed(2) + " tỷ";
  if (Math.abs(v) >= 1e6) return (v / 1e6).toFixed(1) + " tr";
  if (Math.abs(v) >= 1000) return Math.round(v).toLocaleString("vi-VN");
  return (Math.round(v * 100) / 100).toLocaleString("vi-VN");
}

// model: { dates:[..], series:[{data, color, width, dash, name}], bands:[{upper,lower,fill}],
//          yfmt, padL, hover:true, markers:[{i, color}], onHover(idx) }
function render(canvas, model) {
  const W = canvas.clientWidth || canvas.parentElement.clientWidth || 600;
  const H = parseInt(canvas.style.height) || canvas.__h || 320;
  const ctx = css(canvas, W, H);
  const padL = model.padL || 56, padR = 14, padT = 12, padB = 26;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  ctx.clearRect(0, 0, W, H);

  // y-range
  let lo = Infinity, hi = -Infinity;
  const consider = arr => { for (const v of arr) if (v != null && !isNaN(v)) { if (v < lo) lo = v; if (v > hi) hi = v; } };
  model.series.forEach(s => consider(s.data));
  (model.bands || []).forEach(b => { consider(b.upper); consider(b.lower); });
  if (lo === Infinity) { lo = 0; hi = 1; }
  const pad = (hi - lo) * 0.08 || 1; lo -= pad; hi += pad;
  const n = model.dates.length;
  const X = i => padL + (n <= 1 ? 0 : (i / (n - 1)) * plotW);
  const Y = v => padT + plotH - ((v - lo) / (hi - lo)) * plotH;

  // grid + y labels
  ctx.font = "11px 'JetBrains Mono', monospace"; ctx.textBaseline = "middle";
  const ticks = 5;
  for (let t = 0; t <= ticks; t++) {
    const v = lo + (hi - lo) * t / ticks, y = Y(v);
    ctx.strokeStyle = C.grid; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.fillStyle = C.text; ctx.textAlign = "right";
    ctx.fillText(model.yfmt ? model.yfmt(v) : niceFmt(v), padL - 8, y);
  }
  // x labels (năm/tháng)
  ctx.textAlign = "center"; ctx.textBaseline = "top";
  const xticks = Math.min(8, n);
  for (let t = 0; t < xticks; t++) {
    const i = Math.round(t / (xticks - 1) * (n - 1));
    const d = model.dates[i]; const lbl = model.xfmt ? model.xfmt(d) : d.slice(0, 7);
    ctx.fillStyle = C.text; ctx.fillText(lbl, X(i), H - padB + 6);
  }

  // bands (Bollinger)
  (model.bands || []).forEach(b => {
    ctx.beginPath(); let started = false;
    for (let i = 0; i < n; i++) { if (b.upper[i] == null) continue; const x = X(i), y = Y(b.upper[i]); started ? ctx.lineTo(x, y) : (ctx.moveTo(x, y), started = true); }
    for (let i = n - 1; i >= 0; i--) { if (b.lower[i] == null) continue; ctx.lineTo(X(i), Y(b.lower[i])); }
    ctx.closePath(); ctx.fillStyle = b.fill || "rgba(79,209,197,0.07)"; ctx.fill();
  });

  // series
  model.series.forEach(s => {
    ctx.strokeStyle = s.color; ctx.lineWidth = s.width || 1.5;
    ctx.setLineDash(s.dash ? [4, 4] : []);
    ctx.beginPath(); let started = false;
    for (let i = 0; i < n; i++) { const v = s.data[i]; if (v == null || isNaN(v)) { started = false; continue; } const x = X(i), y = Y(v); started ? ctx.lineTo(x, y) : (ctx.moveTo(x, y), started = true); }
    ctx.stroke(); ctx.setLineDash([]);
  });

  // markers (sự kiện)
  (model.markers || []).forEach(m => {
    const x = X(m.i), s0 = model.series[0]; const y = s0.data[m.i] != null ? Y(s0.data[m.i]) : padT + 4;
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = m.color; ctx.fill(); ctx.strokeStyle = "#0E1116"; ctx.lineWidth = 1; ctx.stroke();
  });

  canvas.__geom = { X, Y, padL, padR, padT, padB, plotW, plotH, lo, hi, n, W, H };
  canvas.__model = model;
}

function attachHover(canvas, readoutEl) {
  function move(ev) {
    const m = canvas.__model, g = canvas.__geom; if (!m || !g) return;
    const rect = canvas.getBoundingClientRect();
    const px = ev.clientX - rect.left;
    let i = Math.round((px - g.padL) / g.plotW * (g.n - 1));
    i = Math.max(0, Math.min(g.n - 1, i));
    render(canvas, m); // vẽ lại nền
    const ctx = canvas.getContext("2d");
    const x = g.X(i);
    ctx.strokeStyle = C.cross; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(x, g.padT); ctx.lineTo(x, g.H - g.padB); ctx.stroke(); ctx.setLineDash([]);
    m.series.forEach(s => { const v = s.data[i]; if (v == null) return; const y = g.Y(v); ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fillStyle = s.color; ctx.fill(); });
    if (readoutEl) {
      const parts = [`<b>${m.dates[i]}</b>`];
      m.series.forEach(s => { const v = s.data[i]; if (v != null && s.name) parts.push(`<span style="color:${s.color}">${s.name}</span> ${niceFmt(v)}`); });
      if (m.onHover) { const extra = m.onHover(i); if (extra) parts.push(extra); }
      readoutEl.innerHTML = parts.join(" &nbsp; ");
    }
  }
  canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseleave", () => { if (canvas.__model) render(canvas, canvas.__model); if (readoutEl) readoutEl.innerHTML = ""; });
}

root.Charts = { render, attachHover, niceFmt };
})(window);

</script>

  if(signal==="BUY" && neg)  return {cls:"warn",label:"⚠ Phân kỳ",      explain:"Kỹ thuật MUA nhưng tin vĩ mô TIÊU CỰC — thận trọng: tin xấu có thể kéo giá xuống bất chấp tín hiệu kỹ thuật."};
  if(signal==="SELL"&& pos)  return {cls:"warn",label:"⚠ Phân kỳ",      explain:"Kỹ thuật BÁN nhưng tin vĩ mô TÍCH CỰC — có thể sắp đảo chiều tăng, cân nhắc chưa bán vội."};
  if(signal==="HOLD"&& pos)  return {cls:"buy", label:"Nghiêng tăng",    explain:"Kỹ thuật trung tính; tin vĩ mô tích cực tạo thiên hướng tăng nhẹ."};
  if(signal==="HOLD"&& neg)  return {cls:"sell",label:"Nghiêng giảm",    explain:"Kỹ thuật trung tính; tin vĩ mô tiêu cực tạo thiên hướng giảm nhẹ."};
  return {cls:"hold",label:"Trung lập", explain:"Tin vĩ mô không tạo thiên hướng rõ ràng; chủ yếu dựa vào tín hiệu kỹ thuật."};
}

/* ── Biểu đồ nến ─────────────────────────────────────────── */
function renderCandle(canvas,model){
  const W=canvas.clientWidth||700,H=parseInt(canvas.style.height)||340;
  const dpr=window.devicePixelRatio||1;
  canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);
  const{dates,open,high,low,close,sma20,sma50}=model;
  const n=dates.length;if(!n)return;
  const pL=56,pR=14,pT=14,pB=26,pW=W-pL-pR,pH=H-pT-pB;
  ctx.clearRect(0,0,W,H);
  let lo=Infinity,hi=-Infinity;
  for(let i=0;i<n;i++){if(low[i]<lo)lo=low[i];if(high[i]>hi)hi=high[i];}
  if(sma20)for(const v of sma20)if(v!=null){lo=Math.min(lo,v);hi=Math.max(hi,v);}
  if(sma50)for(const v of sma50)if(v!=null){lo=Math.min(lo,v);hi=Math.max(hi,v);}
  const pad=(hi-lo)*0.06||1;lo-=pad;hi+=pad;
  const X=i=>pL+(i+0.5)/n*pW;
  const Y=v=>pT+pH-(v-lo)/(hi-lo)*pH;
  const cw=Math.max(1,Math.floor(pW/n*0.6));
  ctx.font="11px 'JetBrains Mono',monospace";ctx.textBaseline="middle";
  for(let t=0;t<=5;t++){
    const v=lo+(hi-lo)*t/5,y=Y(v);
    ctx.strokeStyle=CO.grid;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();
    ctx.fillStyle=CO.muted;ctx.textAlign="right";ctx.fillText(CH.niceFmt(v),pL-8,y);
  }
  ctx.textAlign="center";ctx.textBaseline="top";
  for(let t=0;t<Math.min(7,n);t++){
    const i=Math.round(t/(Math.min(7,n)-1)*(n-1));
    ctx.fillStyle=CO.muted;ctx.fillText(dates[i].slice(0,7),X(i),H-pB+6);
  }
  [[sma20,CO.amber],[sma50,CO.accent]].forEach(([arr,col])=>{
    if(!arr)return;ctx.strokeStyle=col;ctx.lineWidth=1.3;ctx.setLineDash([]);
    ctx.beginPath();let s=false;
    for(let i=0;i<n;i++){if(arr[i]==null){s=false;continue;}s?ctx.lineTo(X(i),Y(arr[i])):ctx.moveTo(X(i),Y(arr[i]));s=true;}
    ctx.stroke();
  });
  for(let i=0;i<n;i++){
    const o=open[i],h2=high[i],l2=low[i],c=close[i];if(o==null||c==null)continue;
    const isUp=c>=o,col=isUp?CO.candleUp:CO.candleDown,x=X(i);
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,Y(h2));ctx.lineTo(x,Y(l2));ctx.stroke();
    const yT=Y(Math.max(o,c)),bH=Math.max(1,Y(Math.min(o,c))-yT);
    ctx.fillStyle=isUp?col+"44":col;ctx.strokeStyle=col;ctx.lineWidth=1;
    ctx.fillRect(x-cw/2,yT,cw,bH);ctx.strokeRect(x-cw/2,yT,cw,bH);
  }
  canvas.__cgeom={X,Y,dates,open,high,low,close,n,W,H,pL,pR,pT,pB};
  canvas.__cmodel=model;
}
function attachCandleHover(cv,el){
  cv.addEventListener("mousemove",ev=>{
    const g=cv.__cgeom,m=cv.__cmodel;if(!g||!m)return;
    const r=cv.getBoundingClientRect(),px=ev.clientX-r.left;
    let i=Math.round(px/g.W*g.n-0.5);i=Math.max(0,Math.min(g.n-1,i));
    renderCandle(cv,m);
    const ctx=cv.getContext("2d");
    ctx.strokeStyle=CO.accent;ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(g.X(i),g.pT);ctx.lineTo(g.X(i),g.H-g.pB);ctx.stroke();ctx.setLineDash([]);
    if(el){
      const c=g.close[i],chg=i>0&&g.close[i-1]?(c/g.close[i-1]-1)*100:0;
      el.innerHTML=`<b>${g.dates[i]}</b> &nbsp;`+
        `M<span class="mono"> ${CH.niceFmt(g.open[i])}</span> `+
        `C<span class="mono" style="color:${chg>=0?CO.buy:CO.sell}"> ${CH.niceFmt(c)}</span> `+
        `(${chg>=0?"+":""}${chg.toFixed(2)}%) `+
        `H<span class="mono"> ${CH.niceFmt(g.high[i])}</span> `+
        `L<span class="mono"> ${CH.niceFmt(g.low[i])}</span>`;
    }
  });
  cv.addEventListener("mouseleave",()=>{if(cv.__cmodel)renderCandle(cv,cv.__cmodel);if(el)el.innerHTML="";});
}

/* ============ 3) KIỂM ĐỊNH ============ */
let btSym=Object.keys(E.UNIVERSE)[0]||"VCB";
function renderBacktest(){
  const e=getDetail(btSym);
  if(!e){document.getElementById("view-backtest").innerHTML=`<p class="muted">Không có dữ liệu chi tiết cho mã ${btSym}.</p>`;return;}
  const sig=E.getSignal(btSym);
  const sigArr=e.close.map((_,i)=>{
    if(i<50||e.sma20[i]==null)return"HOLD";
    const sc=(sig?.s_trend||0)*0.276+(sig?.s_mom||0)*0.281+(sig?.s_vol||0)*0.095
            +(sig?.s_volume||0)*0.173+(sig?.s_str||0)*0.175;
    return sc>=0.25?"BUY":sc<=-0.25?"SELL":"HOLD";
  });
  // Backtest đơn giản
  let cash=100000000,shares=0,openP=0;
  const equity=[],trades=[];
  for(let i=0;i<e.close.length;i++){
    const p=e.close[i],a=i===0?"HOLD":sigArr[i-1];
    if(a==="BUY"&&shares===0){const f=cash*0.0015;shares=(cash-f)/p;openP=p;cash=0;}
    else if(a==="SELL"&&shares>0){const pr=shares*p,f=pr*0.0025;cash=pr-f;trades.push((p-openP)/openP);shares=0;}
    equity.push(cash+shares*p);
  }
  const final=equity.at(-1),ret=final/100000000-1;
  const dret=equity.slice(1).map((v,i)=>v/equity[i]-1);
  const m=dret.reduce((a,b)=>a+b,0)/dret.length;
  const sd=Math.sqrt(dret.reduce((a,b)=>a+(b-m)**2,0)/dret.length);
  const sharpe=sd>0?m/sd*Math.sqrt(250):0;
  let peak=-Infinity,maxDD=0;
  for(const v of equity){if(v>peak)peak=v;const dd=v/peak-1;if(dd<maxDD)maxDD=dd;}
  const bh=e.close.at(-1)/e.close[0]-1;
  const wrate=trades.length?trades.filter(t=>t>0).length/trades.length:0;
  const opts=Object.keys(E.UNIVERSE).map(s=>`<option value="${s}" ${s===btSym?"selected":""}>${s} — ${E.UNIVERSE[s].name||s}</option>`).join("");
  const norm=equity.map(v=>v/100000000*100);
  const bh_=e.close.map(v=>v/e.close[0]*100);
  document.getElementById("view-backtest").innerHTML=`
    <div class="row-between"><div><h2>Kiểm định chiến lược</h2><p class="muted">Vốn 100 triệu · phí 0.15%/chiều · thuế bán 0.1%</p></div>
    <select class="sel" onchange="APP.pickBt(this.value)">${opts}</select></div>
    <div class="mgrid">
      ${metric("Lợi nhuận CL",fmtPct(ret,0),ret>bh?"buy":"sell")}
      ${metric("Mua &amp; giữ",fmtPct(bh,0))}
      ${metric("Sharpe",sharpe.toFixed(2))}
      ${metric("MDD",fmtPct(maxDD,0),"sell")}
      ${metric("Số lệnh",trades.length)}
      ${metric("Tỷ lệ thắng",fmtPct(wrate,0))}
    </div>
    <div class="card">
      <div class="muted">Đường vốn (chuẩn hoá = 100)</div>
      <canvas id="cv-eq" style="height:300px"></canvas><div class="readout" id="ro-eq"></div>
      <div class="legend2"><span><i style="background:${CO.accent}"></i>Chiến lược</span><span><i style="background:${CO.muted}"></i>Mua &amp; giữ</span></div>
    </div>
    <p class="muted small">Kết quả quá khứ không bảo đảm tương lai.</p>`;
  const cv=document.getElementById("cv-eq");cv.__h=300;cv.style.height="300px";
  CH.render(cv,{dates:e.dates,
    series:[{data:bh_,color:CO.muted,width:1.3,name:"Mua & giữ"},{data:norm,color:CO.accent,width:1.8,name:"CL"}],
    yfmt:v=>Math.round(v),xfmt:d=>d.slice(0,4)});
  CH.attachHover(cv,document.getElementById("ro-eq"));
}
function metric(l,v,cls){return`<div class="metric ${cls||""}"><div class="m-l">${l}</div><div class="m-v mono">${v}</div></div>`;}

/* ============ 4) SỰ KIỆN ============ */
function renderEvents(){
  const idx=E.indexSeries();
  const evs=E.EVENTS;
  const dpos={};idx.dates.forEach((d,i)=>dpos[d]=i);
  const markers=evs.map(ev=>{
    let i=dpos[ev.date];
    if(i==null){const t=new Date(ev.date).getTime();let best=0,g=1e15;idx.dates.forEach((d,j)=>{const gg=Math.abs(new Date(d)-t);if(gg<g){g=gg;best=j;}});i=best;}
    return{i,color:ev.dir==="up"?CO.buy:CO.sell};
  });
  const evByPos={};markers.forEach((m,k)=>evByPos[m.i]=evs[k]);
  const rows=evs.slice().reverse().map(ev=>`<tr>
    <td class="mono">${ev.date}</td>
    <td><span class="sev ${ev.sev}">${ev.title}</span></td>
    <td class="t-reason">${ev.note}</td>
  </tr>`).join("");
  document.getElementById("view-events").innerHTML=`
    <h2 style="margin-bottom:6px">Sự kiện lớn 2018→${ASOF}</h2>
    <p class="muted" style="margin-bottom:14px">Điểm trên biểu đồ: <span style="color:${CO.sell}">●</span> tiêu cực · <span style="color:${CO.buy}">●</span> tích cực</p>
    <div class="card">
      <canvas id="cv-idx" style="height:320px"></canvas><div class="readout" id="ro-idx"></div>
    </div>
    <div class="card">
      <table class="grid"><thead><tr><th>Ngày</th><th>Sự kiện</th><th>Diễn giải</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
  const cv=document.getElementById("cv-idx");cv.__h=320;cv.style.height="320px";
  CH.render(cv,{dates:idx.dates,series:[{data:idx.close,color:CO.line,width:1.6,name:"VN-Index"}],
    markers,yfmt:v=>CH.niceFmt(v),xfmt:d=>d.slice(0,4),
    onHover:i=>{const ev=evByPos[i];return ev?`<span style="color:${ev.dir==="up"?CO.buy:CO.sell}">● ${ev.title}</span>`:"";},
  });
  CH.attachHover(cv,document.getElementById("ro-idx"));
}

/* ============ ĐIỀU HƯỚNG ============ */
function switchTab(tab){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  document.querySelectorAll(".view").forEach(v=>v.classList.toggle("show",v.id==="view-"+tab));
  if(tab==="table")    renderTable();
  if(tab==="detail")   renderDetail();
  if(tab==="backtest") renderBacktest();
  if(tab==="events")   renderEvents();
}

window.APP={
  init(){
    const badge=document.getElementById("data-badge"),foot=document.getElementById("data-foot-text");
    if(E.isReal&&badge){
      badge.textContent="● Dữ liệu thật";badge.classList.add("real");
      if(foot)foot.textContent=`${Object.keys(E.UNIVERSE).length} mã VN100 · lọc ≥${E.liqMin}tỷ/phiên · cập nhật ${E.asof}.`;
    }
    // Chọn mã đầu tiên có tín hiệu thật
    const syms=Object.keys(E.UNIVERSE);
    if(syms.length){curSym=syms[0];btSym=syms[0];}
    document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
    switchTab("table");
  },
  setFilter(f){tFilter=f;renderTable();},
  setSector(s){tSector=s;renderTable();},
  setSearch(s){tSearch=s;renderTable();},
  goDetail(s){curSym=s;document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab==="detail"));document.querySelectorAll(".view").forEach(v=>v.classList.toggle("show",v.id==="view-detail"));renderDetail();},
  pick(s){curSym=s;renderDetail();},
  setRange(v){curRange=v;renderDetail();},
  pickBt(s){btSym=s;renderBacktest();},
  pickEv(s){renderEvents();},
};
window.addEventListener("resize",()=>{document.querySelectorAll("canvas").forEach(cv=>{if(cv.__cmodel)renderCandle(cv,cv.__cmodel);else if(cv.__model)CH.render(cv,cv.__model);});});
document.addEventListener("DOMContentLoaded",()=>window.APP.init());
})();

</script>
